<!DOCTYPE html>
<html>
<head>
  <title>AuditReady AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>AuditReady AI</h1>
  <p>Instant IT Risk Assessment</p>

  <input type="text" id="company" placeholder="Company Name">
  <input type="text" id="industry" placeholder="Industry">

  <h3>Answer these:</h3>

  <textarea id="q1" placeholder="Do you have access control policies?"></textarea>
  <textarea id="q2" placeholder="Do you use MFA?"></textarea>
  <textarea id="q3" placeholder="Do you perform regular audits?"></textarea>
  <textarea id="q4" placeholder="Backup strategy?"></textarea>

  <button onclick="generateReport()">Generate Assessment</button>

  <h2>Report:</h2>
  <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
